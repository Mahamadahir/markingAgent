name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: GradeAudit-linux-x86_64
          - os: windows-latest
            asset: GradeAudit-windows-x86_64
          - os: macos-13
            asset: GradeAudit-macos-intel
          - os: macos-14
            asset: GradeAudit-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm GradeAudit.spec

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ../${{ matrix.asset }}.tar.gz GradeAudit
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/GradeAudit -DestinationPath ${{ matrix.asset }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
